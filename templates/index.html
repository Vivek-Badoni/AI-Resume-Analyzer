<!DOCTYPE html>
<html>

<head>
    <title>AI Resume Analyzer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding-top: 100px;
            margin: 0;
        }

        /* AI Badge */
        .ai-badge {
            display: inline-block;
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            background: linear-gradient(45deg, #00ffcc, #667eea, #ff00cc);
            background-size: 300% 300%;
            color: white;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.6);
            animation: gradientMove 5s ease infinite, pulseGlow 2s infinite alternate;
            margin-bottom: 25px;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes pulseGlow {
            from {
                box-shadow: 0 0 10px #00ffff;
            }

            to {
                box-shadow: 0 0 25px #ff00ff;
            }
        }

        .box {

            background: white;
            width: 500px;
            max-width: 95%;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);

        }

        input,
        select {
            width: 80%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        .admin {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .admin a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* Mobile Responsive */
        @media screen and (max-width: 768px) {

            body {
                padding: 20px;
                padding-top: 60px;
            }

            .admin {
                position: static;
                margin-bottom: 20px;
                text-align: center;
            }

            .box {
                width: 95%;
                padding: 20px;
            }

            .ai-badge {
                font-size: 16px;
                padding: 10px 20px;
            }

            h2 {
                font-size: 24px;
            }

            input,
            select {
                width: 100%;
                margin: 8px 0;
                font-size: 16px;
            }

            button {
                width: 100%;
                font-size: 16px;
                padding: 14px;
                margin-top: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="admin">
        <a href="/login">🔐 Admin Panel</a>
    </div>

    <!-- AI Badge -->
    <div class="ai-badge">
        🤖 AI Resume Analyzer
    </div>

    <div class="box">

        <h2>Upload Your Resume</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" required><br>

            <select name="role" required>
                <option value="">Select Role</option>
                <option value="Python Developer">Python Developer</option>
                <option value="Web Developer">Web Developer</option>
                <option value="Data Analyst">Data Analyst</option>
                <option value="Frontend Developer">Frontend Developer</option>
                <option value="Backend Developer">Backend Developer</option>
                <option value="Full Stack Developer">Full Stack Developer</option>
                <option value="Machine Learning Engineer">Machine Learning Engineer</option>
                <option value="Cyber Security Analyst">Cyber Security Analyst</option>
                <option value="DevOps Engineer">DevOps Engineer</option>
            </select>
            <br>

            <button type="submit"> Analyze Resume</button>
        </form>

    </div>

</body>

</html>
